name: Release lsh-stack.pyz

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-pyz:
    name: Build release zipapp
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout labo-smart-home
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate release tag
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          expected = f"v{version}"
          tag = os.environ["RELEASE_TAG"]
          if tag != expected:
              raise SystemExit(
                  f"release tag {tag!r} does not match pyproject version {expected!r}"
              )
          PY

      - name: Build lsh-stack.pyz
        run: |
          mkdir -p dist
          python -m zipapp src \
            -m 'lsh_stack_config.cli:entrypoint' \
            -o dist/lsh-stack.pyz \
            -p '/usr/bin/env python3'
          chmod +x dist/lsh-stack.pyz

      - name: Smoke-test lsh-stack.pyz
        run: |
          python dist/lsh-stack.pyz --version
          python dist/lsh-stack.pyz --help
          tmpdir="$(mktemp -d)"
          python dist/lsh-stack.pyz new "$tmpdir/installation"
          grep -F "lsh-stack.pyz setup" "$tmpdir/installation/README.md"
          if python dist/lsh-stack.pyz new "$tmpdir/legacy.toml"; then
            echo "legacy single-file new target unexpectedly succeeded"
            exit 1
          fi
          python dist/lsh-stack.pyz check --config "$tmpdir/installation/lsh_stack.toml"
          python dist/lsh-stack.pyz setup --config "$tmpdir/installation/lsh_stack.toml"
          python dist/lsh-stack.pyz new-core "$tmpdir/core-only"
          test -s "$tmpdir/core-only/lsh_devices.toml"
          test -s "$tmpdir/core-only/platformio.ini"
          grep -F "platformio run -e core_panel" "$tmpdir/core-only/README.md"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: lsh-stack.pyz
          path: dist/lsh-stack.pyz
          if-no-files-found: error

      - name: Attach asset to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/lsh-stack.pyz --clobber
