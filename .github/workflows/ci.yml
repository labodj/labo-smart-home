name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Documentation and Stack Composer
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout labo-smart-home
        uses: actions/checkout@v6
        with:
          path: labo-smart-home

      - name: Checkout lsh-core contract provider
        uses: actions/checkout@v6
        with:
          repository: labodj/lsh-core
          path: lsh-core

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: labo-smart-home/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python3 -m pip install --upgrade pip uv

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('labo-smart-home/uv.lock') }}
          restore-keys: ${{ runner.os }}-uv-

      - name: Install Node dependencies
        working-directory: labo-smart-home
        run: npm ci

      - name: Install Python dependencies
        working-directory: labo-smart-home
        run: uv sync --locked --all-groups

      - name: Run quality gate
        working-directory: labo-smart-home
        run: npm run check

      - name: Validate public stack examples
        working-directory: labo-smart-home
        run: |
          uv run lsh-stack check --config examples/lsh_stack.minimal.toml
          uv run lsh-stack check --config examples/lsh_stack.network-clicks.toml
          uv run lsh-stack check --config examples/lsh_stack.complete.toml

      - name: Smoke-test artifact generation
        working-directory: labo-smart-home
        run: |
          rm -rf examples/generated
          uv run lsh-stack generate --config examples/lsh_stack.complete.toml
          test -s examples/generated/lsh-stack-config.json
          test -s examples/generated/system-config.json
          test -s examples/generated/node-red-lsh-logic.json
          test -s examples/generated/bridge-platformio-flags/bridge.txt
          rm -rf examples/generated

      - name: Build and smoke-test release zipapp
        working-directory: labo-smart-home
        run: |
          mkdir -p dist
          python -m zipapp src \
            -m 'lsh_stack_config.cli:entrypoint' \
            -o dist/lsh-stack.pyz \
            -p '/usr/bin/env python3'
          python dist/lsh-stack.pyz --version
          python dist/lsh-stack.pyz --help
          tmpdir="$(mktemp -d)"
          python dist/lsh-stack.pyz new "$tmpdir/installation"
          grep -F "lsh-stack.pyz setup" "$tmpdir/installation/README.md"
          if python dist/lsh-stack.pyz new "$tmpdir/legacy.toml"; then
            echo "legacy single-file new target unexpectedly succeeded"
            exit 1
          fi
          python dist/lsh-stack.pyz check --config "$tmpdir/installation/lsh_stack.toml"
          python dist/lsh-stack.pyz setup --config "$tmpdir/installation/lsh_stack.toml"
          python dist/lsh-stack.pyz new-core "$tmpdir/core-only"
          test -s "$tmpdir/core-only/lsh_devices.toml"
          test -s "$tmpdir/core-only/platformio.ini"
          grep -F "platformio run -e core_panel" "$tmpdir/core-only/README.md"
