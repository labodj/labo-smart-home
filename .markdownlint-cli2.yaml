config:
  default: true
  MD013:
    line_length: 88
    code_blocks: false
    tables: false
    headings: false
  MD033:
    allowed_elements:
      - img
      - p
      - table
      - td
      - tr
  MD041: false
globs:
  - "README.md"
  - "DOCS.md"
  - "FAQ.md"
  - "GETTING_STARTED.md"
  - "GLOSSARY.md"
  - "HARDWARE_OVERVIEW.md"
  - "QUALITY_GATE.md"
  - "REFERENCE_STACK.md"
  - "STACK_CONFIG.md"
  - "TROUBLESHOOTING.md"
noBanner: true
noProgress: true
